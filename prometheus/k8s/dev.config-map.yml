apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 3s

    scrape_configs:

      # prometheus (own metrics)
      - job_name: prometheus
        static_configs:
          - targets:
              - "localhost:9090"

      # kubelet (node metrics)
      - job_name: nodes
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            reges: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: "kubernetes.default.svc:443"
          - source_labels:
              - __meta_kubernetes_node_name
            regex: (.+)
            target_label: __metrix_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
          # result: https://kubernetes.default.svc:443/api/v1/nodes/<worker-id>/proxy/metrics

      # cAdvisor (container metrics)
      - job_name: cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubectl_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - action: replace
            target_label: __address__
            replacement: "kubernetes.default.svc:443"
          - action: replace
            source_labels:
              - __meta_kubernetes_node_name
            regex: (.+)
            target_label: __metrix_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # spring (app metrics)
      - job_name: spring
        metrics_path: /api/actuator/prometheus
        static_configs:
          - targets:
              - "spring-metrics.default.svc.cluster.local:8177"
