services:
  react:
    image: ghcr.io/aleqsonder/wg-mgr-react:latest
    environment:
      - BACKEND_BASE_URL=http://spring:8177/api
    ports:
      - 80:80
    depends_on:
      - spring
  
  spring:
    image: ghcr.io/aleqsonder/wg-mgr-spring:latest
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - WGMGR_DB_CONN_STR=postgresql://db:5432/vpn
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB=vpn
    volumes:
      # LOCAL_WORKSPACE_FOLDER is required to compose from the devcontainer
      - ${LOCAL_WORKSPACE_FOLDER:-.}/postgres/initdb.d:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:main-distroless
    volumes:
      # LOCAL_WORKSPACE_FOLDER is required to compose from the devcontainer
      - ${LOCAL_WORKSPACE_FOLDER:-.}/prometheus/prod.prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:main-ubuntu
    ports: 
      - "3000:3000"
    volumes:
      # LOCAL_WORKSPACE_FOLDER is required to compose from the devcontainer
      - ${LOCAL_WORKSPACE_FOLDER:-.}/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
  
volumes:
  pgdata:
  promdata:
