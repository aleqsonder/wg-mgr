name: Release the Spring service container image
on:
  push:
    branches:
      - main
    paths:
      - spring/src/**
      - spring/pom.xml
      - spring/prod.dockerfile
env:
  REGISTRY: ghcr.io
jobs:
  check:
    uses: ./.github/workflows/spring-check.yml
  
  release:
    runs-on: ubuntu-latest
    needs:
      - check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build and push the backend image
        uses: docker/build-push-action@v5
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-spring
        with:
          context: spring
          file: spring/prod.dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest

      - name: Commit image tag
        working-directory: spring/k8s
        run: |
          envsubst < deployment.template.yml > deployment.yml
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git pull
          git commit deployment.yml -m "chore(spring): Update image tag to ${IMAGE_TAG} [skip ci]"
          git push
