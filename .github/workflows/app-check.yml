name: Build and test the application
on:
  pull_request:
    branches:
      - main
    paths:
      # ci/cd
      - .github/**

      # spring
      - spring/src/**
      - spring/pom.xml

      # react
      - react/public/**
      - react/src/**
      - react/index.html
      - react/package*.json
      - react/tsconfig*
      - react/vite*
jobs:
  spring:
    uses: ./.github/workflows/spring-check.yml
    secrets: inherit

  react:
    uses: ./.github/workflows/react-check.yml
    secrets: inherit
