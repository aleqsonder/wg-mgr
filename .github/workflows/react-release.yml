name: Release the React service container image
on:
  push:
    branches:
      - main
    paths:
      - react/public/**
      - react/src/**
      - react/index.html
      - react/package*.json
      - react/Dockerfile
      - react/entrypoint.sh
      - react/httpd.template.conf
env:
  REGISTRY: ghcr.io
jobs:
  check:
    uses: ./.github/workflows/react-check.yml

  release:
    runs-on: ubuntu-latest
    needs:
      - check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build and push the backend image
        uses: docker/build-push-action@v5
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-react
        with:
          context: react 
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest
