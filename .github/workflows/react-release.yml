name: Release the React service container image
on:
  push:
    branches:
      - main
    paths:
      - react/public/**
      - react/src/**
      - react/index.html
      - react/package*.json
      - react/Dockerfile
      - react/entrypoint.sh
      - react/httpd.template.conf
env:
  REGISTRY: ghcr.io
jobs:
  check:
    uses: ./.github/workflows/react-check.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs:
      - check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build and push the backend image
        uses: docker/build-push-action@v5
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-react
        with:
          context: react 
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest

      - name: Commit image tag
        working-directory: react/k8s
        run: |
          envsubst < deployment.template.yml > deployment.yml
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git pull
          git commit deployment.yml -m "chore(react): Update image tag to ${IMAGE_TAG} [skip ci]"
          git push

      - name: Notify
        if: always()
        uses: ./.github/actions/tg-notify
        with:
          service: react
          job-status: ${{ job.status }}
          bot-token: ${{ secrets.BOT_TOKEN }}
          chat-id: ${{ secrets.CHAT_ID }}
