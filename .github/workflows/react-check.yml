name: Build and test the React service
on:
  workflow_call:
defaults:
  run:
    working-directory: react
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install deps
        run: npm install

      - name: Build the React service
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install deps
        run: npm install

      - name: Run unit-tests
        run: npm test
