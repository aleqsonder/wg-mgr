name: Test and build the Spring service
on:
  workflow_call:
defaults:
  run:
    working-directory: spring
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
        
      - name: Run unit-tests
        run: mvn -ff -e -Dtest=VpnUserServiceTest test

      - name: Notify
        if: always()
        uses: ./.github/actions/tg-notify
        with:
          service: spring
          job-status: ${{ job.status }}
          bot-token: ${{ secrets.BOT_TOKEN }}
          chat-id: ${{ secrets.CHAT_ID }}

  sonar:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_SPRING }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          mvn clean verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=wg-mgr_spring \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Notify
        if: always()
        uses: ./.github/actions/tg-notify
        with:
          service: spring
          job-status: ${{ job.status }}
          bot-token: ${{ secrets.BOT_TOKEN }}
          chat-id: ${{ secrets.CHAT_ID }}

  build:
    runs-on: ubuntu-latest
    needs:
      - sonar
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build the Spring service
        run: mvn -B clean package -DskipTests

      - name: Notify
        if: always()
        uses: ./.github/actions/tg-notify
        with:
          service: spring
          job-status: ${{ job.status }}
          bot-token: ${{ secrets.BOT_TOKEN }}
          chat-id: ${{ secrets.CHAT_ID }}
