name: Test and build the React service
on:
  workflow_call:
  pull_request:
    branches:
      - main
    paths:
      - react/public/**
      - react/src/**
      - react/index.html
      - react/package*.json
defaults:
  run:
    working-directory: react
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install deps
        run: npm install

      - name: Run unit-tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs:
      - unit-test
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install deps
        run: npm install

      - name: Build the React service
        run: npm run build
