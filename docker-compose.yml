services:
  frontend:
    image: ghcr.io/aleqsonder/wg-mgr-react:latest
    depends_on:
      - backend
    ports:
      - 80:80
    environment:
      - BACKEND_BASE_URL=http://backend:8177/api

  backend:
    image: ghcr.io/aleqsonder/wg-mgr-spring:latest
    depends_on:
      - db
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - WGMGR_DB_CONN_STR=postgresql://db:5432/vpn
  
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB=vpn
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb.d:/docker-entrypoint-initdb.d

  db-adminer:
    image: adminer
    ports:
      - 8080:8080

volumes:
  pgdata:
