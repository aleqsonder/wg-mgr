services:
  react:
    build: react
    environment:
      - BACKEND_BASE_URL=http://spring:8177/api
    ports:
      - 80:80

  spring:
    build: spring
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - WGMGR_DB_CONN_STR=postgresql://db:5432/vpn
    depends_on:
      - db
  
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB=vpn
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}/postgres/initdb.d:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - '8080'

volumes:
  pgdata:
  