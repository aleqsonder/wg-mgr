services:
  dev:
    image: mcr.microsoft.com/devcontainers/base:trixie
    volumes:
      - ..:/workspaces/wg-mgr:cached
    environment:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - WGMGR_DB_CONN_STR=postgresql://db:5432/vpn
    command: sleep infinity

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/initdb.d:/docker-entrypoint-initdb.d
    environment:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - POSTGRES_DB=vpn

  adminer:
    image: adminer
    ports:
      - 8080:8080

volumes:
  pgdata:
