- hosts: qemu
  become: yes

  vars:
    project_dir: /opt/myapp

  tasks:
    - name: Ensure project directory exists
      file:
        path: "{{ project_dir }}"
        state: directory

    - name: Upload docker-compose.yml
      copy:
        src: prod.docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Upload .env
      copy:
        src: .env
        dest: "{{ project_dir }}/.env"
        mode: '0600'

    - name: Upload postgres init scripts
      copy:
        src: postgres/initdb.d
        dest: "{{ project_dir }}/postgres/initdb.d"
        mode: '0644'
        directory_mode: '0755'

    - name: Pull images
      community.docker.docker_compose:
        project_src: "{{ project_dir }}"
        pull: yes

    - name: Start containers
      community.docker.docker_compose:
        project_src: "{{ project_dir }}"
        state: present
